<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asociacion Sueños</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiko:wght@400;600;700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        
        <div class="contenedorLogo">
            <p>imagen logo</p>
        </div>

        <nav class="menu">
            <ul>
                <li>Inicio</li>
                <li>¿Quienes Somos?</li>
                <li>Actividades</li>
                <li>Novedades</li>
                <li>Quiero Ayudar</li>
                <li>Contacto</li>
            </ul>
        </nav>
    </header>

    <form class="formulario">
        <h2>¡Contactanos!</h2>
        <p>Completa el siguiente formulario para que podamos ponernos en contacto</p>

        <div class="form-input">
            <img src="public/img/iconos/user.png" alt="icono de persona">
            <input type="text" id="nombre" placeholder="" required>
            <label for="nombre">Nombre Completo</label>
        </div>

        <div class="form-input">
            <img src="public/img/iconos/mail.png" alt="icono de email">
            <input type="email" id="correo" placeholder="" required>
            <label for="correo">Correo Electronico</label>
        </div>

        <div class="form-input">
            <img src="public/img/iconos/phone.png" alt="icono de telefono">
            <input type="tel" id="telefono" placeholder="" required>
            <label for="telefono">Numero Telefonico</label>
        </div>

        <div class="form-input">
            <img src="public/img/iconos/lista.png" alt="icono lista">
            <select id="motivo" placeholder="" required>
                <option value="" disabled selected hidden></option>
                <option value="consulta">Consulta por Tramites</option>
                <option value="soporte">Otro tipo</option>
            </select>
            <label for="motivo">Motivo de cosulta</label>
        </div>

        <div class="form-input">
            <img src="public/img/iconos/comentario.png" alt="icono de comentario">
            <textarea name="motivoConsulta" id="comentario" placeholder="" required></textarea>
            <label for="comenatrio">Describa su consulta</label>
        </div>

        <button type="submit" class="btnEnviar">Enviar</button>

    </form>

    <footer class="footer">

        <div class="logoFooter">imagen logo</div>

        <p><a href="">Necesito Ayuda</a></p>

        <div class="iconos">
            <img src="public/img/iconos/instagram.png" alt="icono instagram">
            <img src="public/img/iconos/mail.png" alt="icono email">
            <img src="public/img/iconos/facebook.png" alt="icono facebook">
        </div>
    </footer>

    <script src="script.js"></script>

</body>

</html>
