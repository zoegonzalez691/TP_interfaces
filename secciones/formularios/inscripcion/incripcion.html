<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asocicacion Sueños</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiko:wght@400;600;700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../../../global.css">
    <link rel="stylesheet" href="../estiloForm.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.10.2/lottie.min.js"></script>
    <script src="../../../componentes.js"></script>
</head>

<body>

    <site-header></site-header>

    <div class="contenido">

        <div id="animacion-carga"></div>

        <form class="form-base" id="contactoForm">

            <h1>¡Anotate!</h1>
            <p>Completa el siguiente formulario para que puedas compartir la actividad con nosotros</p>

            <div class="seccion-input">
                <div class="form-input">
                    <img class="icono" src="../../../public/assets/iconos/user.png" alt="icono de persona">
                    <input type="text" id="nombre" placeholder=" " required>
                    <label for="nombre">Nombre Completo</label>
                </div>

                <small class="error" id="errorNombre"></small>
            </div>

            <div class="seccion-input">
                <div class="form-input">
                    <img class="icono" src="../../../public/assets/iconos/mail.png" alt="icono de email">
                    <input type="email" id="correo" placeholder=" " required>
                    <label for="correo">Correo Electrónico</label>
                </div>

                <small class="error" id="errorMail"></small>
            </div>

            <div class="seccion-input">
                <div class="form-input">
                    <img class="icono" src="../../../public/assets/iconos/phone.png" alt="icono de teléfono">
                    <input type="tel" id="telefono" placeholder=" " required>
                    <label for="telefono">Número Telefónico</label>
                </div>
                <small class="example">Ej: 2494011781 (código de área + número)</small>

                <small class="error" id="errorTel"></small>
            </div>

            <div class="seccion-input">
                <div class="form-input">
                    <img class="icono" src="../../../public/assets/iconos/hastag.png" alt="icono de numeral">
                    <input type="text" id="dni" placeholder=" " required>
                    <label for="dni">Ingrese su DNI</label>
                </div>
                <small class="example">Ej: 47159785 (sin puntos)</small>

                <small class="error" id="errorDNI"></small>
            </div>

            <div class="seccion-input">
                <div class="form-input">
                    <label for="fechaNacimiento">Fecha de nacimiento:</label>
                    <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
                </div>

                <small class="error" id="fecha"></small>
            </div>

            <button type="submit" class="btnEnviar" id="btnEnviar" disabled>Enviar</button>
        </form>
    </div>

    </div>


    <site-footer></site-footer>

    <script src="inscripcion.js"></script>



</body>

</html>
