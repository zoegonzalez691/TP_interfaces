<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asociacion Sueños</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiko:wght@400;600;700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../../global.css">
    <link rel="stylesheet" href="estiloNovedades.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.10.2/lottie.min.js"></script>
    <script src="../../componentes.js"></script>
</head>

<body>

    <site-header></site-header>

    <div class="contenido">

        <div id="contenedor-superior">
            <div id="filter">

                <div class="campo-busqueda">
                    <label for="busqueda" class="sr-only">Inserte un título</label>
                    <img src="../../public/assets/iconos/busqueda.png" alt="icono buscar" class="icono-buscar">
                    <input type="text" id="busqueda" placeholder="buscar titulo">
                </div>

                <label for="filtros" class="sr-only">Filtros</label>
                <select id="filtros">
                    <option value="">Filtro</option>
                    <option value="relevancia">Relevancia</option>
                </select>

            </div>

            <script>
                if (localStorage.getItem('isLoggedIn') === 'true') {
                    document.write('<button class="btn" id="agregar"><img src="../../public/assets/iconos/agregar.png" alt="icono agregar" class="icono"></button>');
                }
            </script>

        </div>

        <div id="animacion-carga"></div>

        <div id="noticias-container">

        </div>

    </div>

    <site-footer></site-footer>


    <script src="novedades.js"></script>
</body>

</html>
